name: Frontend CI

on:
  push:
    paths:
      - 'client/**'
    branches:
      - main
  pull_request:
    paths:
      - 'client/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/LMS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/LMS/package-lock.json
      - run: npm ci
      - run: npm run build
